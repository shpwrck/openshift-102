---
# Release-only: same site as default-site.yml plus @antora/pdf-extension.
# Produces static HTML and component PDFs under out-dir. Used by .github/workflows/release-offline.yml.
# Not used by Dockerfile.runtime (keeps the runtime image free of Asciidoctor/PDF build artifacts).
site:
  title: OpenShift 102 Workshop
  url: "https://example.com"
  start_page: master@openshift-102:ROOT:index.adoc

asciidoc:
  attributes:
    openshift-102-showroom: true
    tools-image-basename: ghcr.io/shpwrck/openshift-102-tools
    tools-image-tag: latest

content:
  sources:
    - url: .
      start_path: content/openshift-102
    - url: .
      start_path: content/bundled/helm-workshop
    - url: .
      start_path: content/bundled/deploy-workshop
    - url: .
      start_path: content/bundled/istio-workshop
    - url: .
      start_path: content/bundled/prometheus-workshop

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/v0.0.1/ui-bundle.zip
    snapshot: true
  supplemental_files:
    - path: ./content/openshift-102/supplemental-ui
    - path: ./content/openshift-102/lib
    - path: .nojekyll
    - path: ui.yml
      contents: "static_files: [ .nojekyll ]"

runtime:
  cache_dir: ./.cache/antora

antora:
  extensions:
    - require: ./content/openshift-102/lib/dev-mode.js
      enabled: false
    - "@antora/pdf-extension"

output:
  dir: ./www-pdf-exports
