# Paste into the OpenShift web console: click **+** → **Import YAML**, choose your
# project, paste this manifest, then **Create**. No local `oc` client required.
#
# After the pod is running: **Workloads → Pods** → pod for this Deployment → **Terminal**.
# If the web terminal starts `sh`, run `bash` or `bash -l` for an interactive bash
# session (tool banner and full environment).
#
# Edit the image line for your registry or release tag (match your showroom bundle).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: openshift-102-workshop-tools
  labels:
    app.kubernetes.io/name: openshift-102-workshop-tools
    app.kubernetes.io/part-of: openshift-102-workshop
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openshift-102-workshop-tools
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openshift-102-workshop-tools
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tools
          # Replace with your mirror or pinned tag (e.g. ghcr.io/<org>/openshift-102-tools:v1.0.5)
          image: ghcr.io/shpwrck/openshift-102-tools:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
