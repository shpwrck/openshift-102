name: Publish to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "README.adoc"
      - ".gitignore"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: configure pages
        uses: actions/configure-pages@v5
      - name: verify workshop submodules
        run: ./scripts/verify-submodules.sh
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.13.1
      - name: install antora
        run: npm install --global @antora/cli@3.1 @antora/site-generator@3.1
      - name: setup helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: antora generate
        run: antora generate default-site.yml --stacktrace
      - name: package helm chart for static repo (GitHub Pages)
        run: |
          set -euo pipefail
          OWNER=$(echo '${{ github.repository }}' | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')
          REPO=$(echo '${{ github.repository }}' | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')
          BASE_URL="https://${OWNER}.github.io/${REPO}/helm"
          mkdir -p www/helm
          rm -f www/helm/*.tgz www/helm/index.yaml
          helm lint deploy/helm/openshift-102-workshop
          helm package deploy/helm/openshift-102-workshop \
            --version "0.1.${{ github.run_number }}" \
            --app-version "$(git describe --tags --always 2>/dev/null | head -c80 || echo snapshot)"
          mv openshift-102-workshop-*.tgz www/helm/
          ( cd www/helm && helm repo index --url "${BASE_URL}" . )
          echo "Helm repo base URL: ${BASE_URL}"
          ls -la www/helm/
      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: www
          include-hidden-files: true
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy github pages
        id: deployment
        uses: actions/deploy-pages@v5
