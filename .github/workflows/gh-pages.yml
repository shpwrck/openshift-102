name: Publish to GitHub Pages
# Tag pushes need the github-pages *environment* to allow refs/tags/v* (or all refs);
# see README "GitHub Pages" → deployment rules. Otherwise tag deploys fail protection checks.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "README.adoc"
      - ".gitignore"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: configure pages
        uses: actions/configure-pages@v5
      - name: verify workshop submodules
        run: ./scripts/verify-submodules.sh
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.13.1
      - name: install antora
        run: npm install --global @antora/cli@3.1 @antora/site-generator@3.1
      - name: setup helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: antora generate
        run: antora generate default-site.yml --stacktrace
      - name: package helm chart for static repo (GitHub Pages)
        env:
          GH_REF_TYPE: ${{ github.ref_type }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          OWNER=$(echo '${{ github.repository }}' | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')
          REPO=$(echo '${{ github.repository }}' | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')
          BASE_URL="https://${OWNER}.github.io/${REPO}/helm"
          mkdir -p www/helm
          rm -f www/helm/*.tgz www/helm/index.yaml
          helm lint deploy/helm/openshift-102-workshop
          # Chart semver matches Git release tag (v1.2.3 -> 1.2.3). Untagged main builds use latest v* tag +ci.<run> so each index entry stays unique.
          if [ "${GH_REF_TYPE}" = "tag" ] && [[ "${GH_REF_NAME}" =~ ^v[0-9] ]]; then
            CHART_VERSION="${GH_REF_NAME#v}"
            APP_VERSION="${GH_REF_NAME}"
          elif TAG=$(git describe --tags --abbrev=0 --match 'v*' HEAD 2>/dev/null); then
            CHART_VERSION="${TAG#v}+ci.${GH_RUN_NUMBER}"
            APP_VERSION="$(git describe --tags --always 2>/dev/null | head -c80 || echo snapshot)"
          else
            CHART_VERSION="0.0.1+ci.${GH_RUN_NUMBER}"
            APP_VERSION="$(git describe --tags --always 2>/dev/null | head -c80 || echo snapshot)"
          fi
          echo "Helm chart version: ${CHART_VERSION} (appVersion: ${APP_VERSION})"
          helm package deploy/helm/openshift-102-workshop \
            --version "${CHART_VERSION}" \
            --app-version "${APP_VERSION}"
          mv openshift-102-workshop-*.tgz www/helm/
          ( cd www/helm && helm repo index --url "${BASE_URL}" . )
          echo "Helm repo base URL: ${BASE_URL}"
          ls -la www/helm/
      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: www
          include-hidden-files: true
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy github pages
        id: deployment
        uses: actions/deploy-pages@v5
